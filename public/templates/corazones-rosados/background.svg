<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <radialGradient id="rose" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#fff1f5" />
      <stop offset="55%" stop-color="#f8c5d6" />
      <stop offset="100%" stop-color="#f09fbb" />
    </radialGradient>
    <linearGradient id="rgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ebc4" />
      <stop offset="50%" stop-color="#c8a04a" />
      <stop offset="100%" stop-color="#a9791f" />
    </linearGradient>
    <symbol id="heart" viewBox="-50 -50 100 100">
      <path d="M0,32 C-46,-8 -32,-52 0,-22 C32,-52 46,-8 0,32 Z" />
    </symbol>
  </defs>

  <rect width="1200" height="1800" fill="url(#rose)" />

  <!-- Corazones decorativos dispersos -->
  <g fill="#e96a96" opacity="0.30">
    <use href="#heart" x="60" y="60" width="120" height="120" />
    <use href="#heart" x="1010" y="120" width="100" height="100" />
    <use href="#heart" x="120" y="640" width="80" height="80" />
    <use href="#heart" x="1000" y="560" width="110" height="110" />
    <use href="#heart" x="540" y="40" width="70" height="70" />
  </g>
  <g fill="#f3c14b" opacity="0.55">
    <use href="#heart" x="300" y="120" width="46" height="46" />
    <use href="#heart" x="900" y="320" width="56" height="56" />
    <use href="#heart" x="180" y="360" width="40" height="40" />
    <use href="#heart" x="760" y="700" width="50" height="50" />
  </g>

  <!-- Tarjeta blanca inferior -->
  <rect x="40" y="840" width="1120" height="880" rx="40" fill="#ffffff" />
  <rect x="40" y="840" width="1120" height="880" rx="40" fill="none"
        stroke="url(#rgold)" stroke-width="10" />
  <rect x="58" y="858" width="1084" height="844" rx="32" fill="none"
        stroke="#d98aa6" stroke-width="2" opacity="0.6" />

  <!-- Divisor de corazón bajo el nombre -->
  <g transform="translate(600,1075)">
    <line x1="-240" y1="0" x2="-34" y2="0" stroke="url(#rgold)" stroke-width="3" />
    <line x1="34" y1="0" x2="240" y2="0" stroke="url(#rgold)" stroke-width="3" />
    <use href="#heart" x="-18" y="-18" width="36" height="36" fill="#e0577f" />
  </g>
</svg>
