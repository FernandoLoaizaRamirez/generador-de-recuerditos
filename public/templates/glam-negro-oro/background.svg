<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <radialGradient id="noir" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="60%" stop-color="#141414" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="glamgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e7a8" />
      <stop offset="50%" stop-color="#d4af52" />
      <stop offset="100%" stop-color="#a9791f" />
    </linearGradient>
  </defs>

  <rect width="1200" height="1800" fill="url(#noir)" />

  <!-- Abanicos art-déco en las esquinas -->
  <g stroke="url(#glamgold)" stroke-width="3" opacity="0.85" fill="none">
    <g transform="translate(60,60)">
      <line x1="0" y1="0" x2="200" y2="0" /><line x1="0" y1="0" x2="185" y2="60" />
      <line x1="0" y1="0" x2="150" y2="118" /><line x1="0" y1="0" x2="100" y2="160" />
      <line x1="0" y1="0" x2="60" y2="185" /><line x1="0" y1="0" x2="0" y2="200" />
    </g>
    <g transform="translate(1140,60) scale(-1,1)">
      <line x1="0" y1="0" x2="200" y2="0" /><line x1="0" y1="0" x2="185" y2="60" />
      <line x1="0" y1="0" x2="150" y2="118" /><line x1="0" y1="0" x2="100" y2="160" />
      <line x1="0" y1="0" x2="60" y2="185" /><line x1="0" y1="0" x2="0" y2="200" />
    </g>
  </g>

  <!-- Marco fino doble -->
  <rect x="46" y="46" width="1108" height="1708" rx="14" fill="none"
        stroke="url(#glamgold)" stroke-width="7" />
  <rect x="64" y="64" width="1072" height="1672" rx="8" fill="none"
        stroke="#d4af52" stroke-width="1.5" opacity="0.6" />

  <!-- Divisor bajo el nombre -->
  <g transform="translate(600,1270)">
    <line x1="-240" y1="0" x2="-26" y2="0" stroke="url(#glamgold)" stroke-width="3" />
    <line x1="26" y1="0" x2="240" y2="0" stroke="url(#glamgold)" stroke-width="3" />
    <rect x="-9" y="-9" width="18" height="18" transform="rotate(45)" fill="url(#glamgold)" />
  </g>
</svg>
