<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" width="240" height="360">
  <defs>
    <radialGradient id="tpink" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#fdeef2" />
      <stop offset="60%" stop-color="#f7cdd8" />
      <stop offset="100%" stop-color="#efb0c2" />
    </radialGradient>
    <linearGradient id="tgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0dfa0" />
      <stop offset="50%" stop-color="#c8a04a" />
      <stop offset="100%" stop-color="#a9791f" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" fill="url(#tpink)" />
  <circle cx="40" cy="36" r="20" fill="#ffffff" opacity="0.4" />
  <circle cx="205" cy="120" r="24" fill="#ffffff" opacity="0.35" />

  <!-- marcos -->
  <rect x="26" y="34" width="118" height="104" rx="6" fill="#ffffff"
        stroke="url(#tgold)" stroke-width="6" transform="rotate(-6 85 86)" />
  <rect x="120" y="120" width="98" height="86" rx="6" fill="#ffffff"
        stroke="url(#tgold)" stroke-width="6" transform="rotate(5 169 163)" />

  <!-- Mis 15 -->
  <text x="196" y="44" font-family="Georgia, serif" font-style="italic"
        font-weight="bold" font-size="30" fill="url(#tgold)"
        text-anchor="middle">Mis 15</text>

  <!-- mariposa -->
  <g transform="translate(70,150)" stroke="#a9791f" stroke-width="1">
    <path d="M0,0 C-22,-22 -28,-4 -10,2 Z" fill="#ea4b96" />
    <path d="M0,0 C22,-22 28,-4 10,2 Z" fill="#ea4b96" />
  </g>

  <!-- tarjeta inferior -->
  <rect x="14" y="208" width="212" height="138" rx="10" fill="#ffffff"
        stroke="url(#tgold)" stroke-width="4" />
  <rect x="26" y="220" width="78" height="112" rx="4" fill="#e9d9e2" />
  <text x="170" y="250" font-family="'Segoe Script','Brush Script MT',cursive"
        font-size="22" fill="#c14d86" text-anchor="middle">Nombre</text>
  <rect x="120" y="288" width="100" height="6" rx="3" fill="#d8c6cf" />
  <rect x="132" y="304" width="76" height="6" rx="3" fill="#d8c6cf" />
</svg>
